kind = "web"
previewPath = "/"
title = "الخطيب للمقاولات"
version = "1.0.0"
id = "artifacts/alkhatib-contracting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25962

[services.development]
run = "pnpm --filter @workspace/alkhatib-contracting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alkhatib-contracting", "run", "build" ]
publicDir = "artifacts/alkhatib-contracting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25962"
BASE_PATH = "/"
