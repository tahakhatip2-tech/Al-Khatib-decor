<svg width="400" height="400" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blue3d" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stopColor="#2563EB" />
      <stop offset="1" stopColor="#1E3A8A" />
    </linearGradient>
    <linearGradient id="yellow3d" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stopColor="#EAB308" />
      <stop offset="1" stopColor="#FDE047" />
    </linearGradient>
    <filter id="shadow" dx="2" dy="4">
      <feDropShadow dx="1" dy="2" stdDeviation="2" floodOpacity="0.25" />
    </filter>
  </defs>
  
  <!-- Background hexagon base -->
  <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="url(#blue3d)" opacity="0.08" />

  <!-- Building/Skyscrapers -->
  <path d="M25 40 L45 20 L45 80 L25 80 Z" fill="url(#blue3d)" filter="url(#shadow)" />
  <path d="M45 20 L55 30 L55 80 L45 80 Z" fill="#1e3a8a" opacity="0.9" />
  
  <path d="M55 45 L75 25 L75 80 L55 80 Z" fill="url(#blue3d)" filter="url(#shadow)" />
  <path d="M75 25 L85 35 L85 80 L75 80 Z" fill="#1e3a8a" opacity="0.9" />

  <!-- Geometric A intersecting -->
  <path d="M15 80 L50 15 L60 15 L50 40 L40 40 L35 80 Z" fill="url(#yellow3d)" filter="url(#shadow)" />
  
  <!-- Geometric K intersecting -->
  <path d="M60 40 L70 25 L85 25 L70 45 L90 80 L75 80 L60 55 L50 40 Z" fill="url(#yellow3d)" filter="url(#shadow)" />
  
  <!-- 3D highlights -->
  <path d="M50 15 L60 15 L70 25 L65 30 Z" fill="#ffffff" opacity="0.4" />
</svg>
